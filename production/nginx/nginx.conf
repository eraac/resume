# Run as the unprivileged user (defined in the Dockerfile)
# Note: 'user' directive is ignored if NGINX isn't run as root, so we omit it here.

worker_processes auto;

pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Performance optimizations for static files
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;

    # Security: Hide NGINX version
    server_tokens off;

    # Security: Buffer size limitations to prevent DDoS/Buffer Overflows
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    client_max_body_size 1k; # Extremely small since we only serve static files
    large_client_header_buffers 2 1k;

    # Security: Timeouts to drop slow connections (Slowloris mitigation)
    client_body_timeout 10;
    client_header_timeout 10;
    send_timeout 10;

    map $http_accept $index_file {
        default            "index.html";
        "application/json" "index.json";
    }

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;

        index $index_file;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self';" always;

        location / {
            # Security: Only allow GET and HEAD requests. Drop POST, PUT, DELETE, etc.
            limit_except GET HEAD {
                deny all;
            }

            try_files $uri $uri/ =404;
        }

        # Security: Deny access to hidden files (e.g., .git, .env, .htaccess)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
